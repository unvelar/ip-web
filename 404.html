<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // SPA redirect: rewrite path as query param so index.html can restore it
    var path = window.location.pathname;
    window.location.replace(
      window.location.origin + '/?p=' + encodeURIComponent(path)
    );
  </script>
</head>
</html>
