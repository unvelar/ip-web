name: Deploy PR preview

on:
  pull_request:
    types: [opened, reopened, closed]
  push:
    branches-ignore:
      - main
      - gh-pages

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: gh-pages-write
  cancel-in-progress: false

jobs:
  preview:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Resolve preview target
        id: preview
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"

            if [[ "${{ github.event.action }}" == "closed" ]]; then
              echo "should_build=false" >> "$GITHUB_OUTPUT"
              echo "preview_action=remove" >> "$GITHUB_OUTPUT"
            else
              echo "should_build=true" >> "$GITHUB_OUTPUT"
              echo "preview_action=deploy" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          pr_number="$(
            gh api \
              --method GET \
              "repos/${GITHUB_REPOSITORY}/pulls" \
              -f state=open \
              -f head="${GITHUB_REPOSITORY_OWNER}:${GITHUB_REF_NAME}" \
              --jq '.[0].number // empty'
          )"

          echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          if [[ -z "$pr_number" ]]; then
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "preview_action=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          echo "should_build=true" >> "$GITHUB_OUTPUT"
          echo "preview_action=deploy" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.preview.outputs.should_deploy == 'true'
        with:
          ref: ${{ steps.preview.outputs.sha }}

      - uses: oven-sh/setup-bun@v2
        if: steps.preview.outputs.should_build == 'true'

      - run: bun install
        if: steps.preview.outputs.should_build == 'true'

      - name: Capture build metadata
        id: build-meta
        if: steps.preview.outputs.should_build == 'true'
        run: echo "time=$(git show -s --format=%cI HEAD)" >> "$GITHUB_OUTPUT"

      - run: bun run build
        if: steps.preview.outputs.should_build == 'true'
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_BASE_PATH: /pr-preview/pr-${{ steps.preview.outputs.pr_number }}/
          VITE_BUILD_SHA: ${{ steps.preview.outputs.sha }}
          VITE_BUILD_TIME: ${{ steps.build-meta.outputs.time }}

      - uses: rossjrw/pr-preview-action@v1
        if: steps.preview.outputs.should_deploy == 'true'
        with:
          source-dir: ./dist
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: ${{ steps.preview.outputs.preview_action }}
          pr-number: ${{ steps.preview.outputs.pr_number }}
          deploy-commit-message: "Deploy preview for PR ${{ steps.preview.outputs.pr_number }}: ${{ steps.preview.outputs.sha }}"
          remove-commit-message: "Remove preview for PR ${{ steps.preview.outputs.pr_number }}"
