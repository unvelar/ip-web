name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # manual re-run when a push event is dropped

permissions:
  contents: write

concurrency:
  group: gh-pages-write
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_BASE_PATH: /
          # Injected into the bundle so the UI can show which commit is live —
          # makes cache-vs-deploy mismatches trivially diagnosable in-browser.
          VITE_BUILD_SHA: ${{ github.sha }}
          VITE_BUILD_TIME: ${{ github.event.head_commit.timestamp }}
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true
          cname: unvelar.com
